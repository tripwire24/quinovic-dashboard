<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quinnevic — Google Ads Dashboard</title>
  <meta name="description" content="Quinnevic Google Ads campaign performance dashboard">
  <meta name="theme-color" content="#1e3a5f">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef5ff',
              100: '#d9e8ff',
              200: '#bcd7ff',
              300: '#8ebfff',
              400: '#599dff',
              500: '#3379fc',
              600: '#1d5af1',
              700: '#1545de',
              800: '#1839b4',
              900: '#1a338e',
              950: '#142156',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Header -->
  <header class="bg-brand-950 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 sm:py-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div>
          <h1 class="text-xl sm:text-2xl font-bold tracking-tight">Quinnevic</h1>
          <p class="text-brand-300 text-sm mt-0.5">Google Ads Performance Dashboard</p>
        </div>
        <div id="last-updated" class="text-brand-300 text-xs sm:text-sm"></div>
      </div>
    </div>
  </header>

  <!-- Date Range Bar -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
      <div class="flex flex-col sm:flex-row sm:items-center gap-3">
        <!-- Preset buttons -->
        <div class="flex gap-1.5 flex-wrap" id="presets">
          <button data-days="7" class="preset-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-300 text-gray-600 hover:bg-brand-50 hover:border-brand-300 hover:text-brand-700 transition-colors">7 days</button>
          <button data-days="30" class="preset-btn px-3 py-1.5 rounded-full text-xs font-medium border border-brand-500 bg-brand-50 text-brand-700">30 days</button>
          <button data-days="90" class="preset-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-300 text-gray-600 hover:bg-brand-50 hover:border-brand-300 hover:text-brand-700 transition-colors">90 days</button>
          <button data-days="all" class="preset-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-300 text-gray-600 hover:bg-brand-50 hover:border-brand-300 hover:text-brand-700 transition-colors">All time</button>
        </div>
        
        <!-- Custom date inputs -->
        <div class="flex items-center gap-2 ml-auto">
          <input type="date" id="date-start" class="date-input text-xs border border-gray-300 rounded-lg px-2.5 py-1.5 focus:ring-2 focus:ring-brand-300 focus:border-brand-400 outline-none">
          <span class="text-gray-400 text-xs">to</span>
          <input type="date" id="date-end" class="date-input text-xs border border-gray-300 rounded-lg px-2.5 py-1.5 focus:ring-2 focus:ring-brand-300 focus:border-brand-400 outline-none">
          <button id="btn-apply" class="px-3 py-1.5 bg-brand-600 text-white rounded-lg text-xs font-medium hover:bg-brand-700 transition-colors shadow-sm">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center py-20">
      <div class="loader mb-4"></div>
      <p class="text-gray-400 text-sm">Loading campaign data…</p>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <p class="text-red-600 font-medium">Unable to load data</p>
      <p id="error-msg" class="text-red-400 text-sm mt-1"></p>
      <button onclick="loadData()" class="mt-3 px-4 py-2 bg-red-100 text-red-700 rounded-lg text-sm hover:bg-red-200 transition-colors">Retry</button>
    </div>

    <!-- Summary Cards -->
    <div id="summary" class="hidden">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <div class="summary-card bg-white rounded-xl p-4 sm:p-5 border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-medium">Total Clicks</p>
          <p id="total-clicks" class="text-2xl sm:text-3xl font-bold text-brand-700 mt-1">—</p>
        </div>
        <div class="summary-card bg-white rounded-xl p-4 sm:p-5 border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-medium">Impressions</p>
          <p id="total-impressions" class="text-2xl sm:text-3xl font-bold text-gray-700 mt-1">—</p>
        </div>
        <div class="summary-card bg-white rounded-xl p-4 sm:p-5 border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-medium">Total Spend</p>
          <p id="total-cost" class="text-2xl sm:text-3xl font-bold text-emerald-600 mt-1">—</p>
        </div>
        <div class="summary-card bg-white rounded-xl p-4 sm:p-5 border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-medium">Avg CTR</p>
          <p id="avg-ctr" class="text-2xl sm:text-3xl font-bold text-amber-600 mt-1">—</p>
        </div>
      </div>
    </div>

    <!-- Trend Chart -->
    <div id="chart-section" class="hidden bg-white rounded-xl border border-gray-100 shadow-sm p-4 sm:p-6">
      <h2 class="text-sm font-semibold text-gray-700 mb-4">Daily Clicks</h2>
      <div class="relative" style="height: 220px;">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <!-- Campaign Cards -->
    <div id="campaigns" class="hidden">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Campaigns</h2>
      <div id="campaign-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <!-- Cards injected by JS -->
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 text-center text-xs text-gray-300">
      Quinnevic Ads Dashboard &middot; Data refreshes daily
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
